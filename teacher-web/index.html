<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpiSign — Émetteur Formateur</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            margin-bottom: 40px;
        }
        .totp-display {
            font-size: 6rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.1em;
            font-family: 'SF Mono', 'Menlo', monospace;
            margin: 20px 0;
            user-select: none;
        }
        .timer-bar {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 20px auto;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            transition: width 1s linear;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }
        .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .info {
            margin-top: 40px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        .mode-toggle {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .mode-toggle label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
        }
        .mode-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .mode-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
        }
        .mode-badge.ultrasound { background: rgba(74,222,128,0.2); color: #4ade80; }
        .mode-badge.audible { background: rgba(251,191,36,0.2); color: #fbbf24; }
        /* Login form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
            margin: 0 auto;
        }
        .login-form input, .login-form select {
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .login-form input::placeholder { color: rgba(255,255,255,0.3); }
        .login-form button {
            padding: 14px;
            border-radius: 999px;
            border: none;
            background: #fff;
            color: #000;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .login-form button:hover { opacity: 0.9; }
        #error-msg {
            color: #f87171;
            font-size: 0.85rem;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="login-screen">
        <h1>EpiSign Formateur</h1>
        <p class="subtitle">Entrez le secret TOTP de la session</p>
        <div class="login-form">
            <input type="text" id="totp-secret" placeholder="Secret TOTP (base32)" value="JBSWY3DPEHPK3PXP">
            <input type="text" id="course-name" placeholder="Nom du cours" value="iOS Development">
            <div class="mode-toggle">
                <input type="checkbox" id="dev-mode">
                <label for="dev-mode">Mode dev (audible ~1-4 kHz, pour test MacBook)</label>
            </div>
            <button onclick="startEmitting()">Démarrer l'émission</button>
            <p id="error-msg"></p>
        </div>
    </div>

    <div class="container" id="emit-screen" style="display:none;">
        <h1 id="display-course">iOS Development</h1>
        <p class="subtitle">Code TOTP actuel — fallback saisie manuelle</p>
        <div class="totp-display" id="totp-code">------</div>
        <div class="timer-bar">
            <div class="timer-fill" id="timer-fill"></div>
        </div>
        <div class="status">
            <span class="dot" id="emit-dot"></span>
            <span id="status-text">Émission active</span>
        </div>
        <div id="mode-badge-container"></div>
        <p class="info" id="info-text">
            Signal ultrasonique 17-20 kHz · Renouvellement toutes les 30s<br>
            Les étudiants peuvent aussi saisir le code manuellement
        </p>
    </div>

    <!-- OTPAuth for TOTP generation -->
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9/dist/otpauth.umd.min.js"></script>

    <script>
        let ggwaveModule = null;
        let ggwaveInstance = null;
        let audioContext = null;
        let emitInterval = null;
        let totpSecret = null;
        let lastCode = '';
        let isDevMode = false;

        // Load ggwave WASM from official CDN
        async function loadGGWave() {
            const urls = [
                'https://ggwave-js.ggerganov.com/ggwave.js',
                'https://cdn.jsdelivr.net/npm/ggwave@0.4.0/build/ggwave.js',
            ];

            for (const url of urls) {
                try {
                    await new Promise((resolve, reject) => {
                        const s = document.createElement('script');
                        s.src = url;
                        s.onload = resolve;
                        s.onerror = reject;
                        document.head.appendChild(s);
                    });
                    if (typeof ggwave_factory === 'function') {
                        console.log('ggwave loaded from:', url);
                        return;
                    }
                } catch (e) {
                    console.warn('Failed to load ggwave from:', url);
                }
            }
            throw new Error('Could not load ggwave from any source');
        }

        async function startEmitting() {
            const secret = document.getElementById('totp-secret').value.trim();
            const courseName = document.getElementById('course-name').value.trim();

            if (!secret) {
                document.getElementById('error-msg').textContent = 'Secret TOTP requis';
                return;
            }

            totpSecret = secret;
            isDevMode = document.getElementById('dev-mode').checked;
            document.getElementById('display-course').textContent = courseName;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('emit-screen').style.display = 'block';

            // Update UI for selected mode
            const badgeContainer = document.getElementById('mode-badge-container');
            const infoText = document.getElementById('info-text');
            if (isDevMode) {
                badgeContainer.innerHTML = '<span class="mode-badge audible">MODE DEV — Audible ~1-4 kHz</span>';
                infoText.innerHTML = 'Signal audible 1-4 kHz (dev/test MacBook) · Renouvellement toutes les 30s<br>Les étudiants peuvent aussi saisir le code manuellement';
            } else {
                badgeContainer.innerHTML = '<span class="mode-badge ultrasound">Ultrason 17-20 kHz</span>';
                infoText.innerHTML = 'Signal ultrasonique 17-20 kHz · Renouvellement toutes les 30s<br>Les étudiants peuvent aussi saisir le code manuellement';
            }

            // Initialize audio + ggwave
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 48000
                });

                // Load and init ggwave
                await loadGGWave();
                ggwaveModule = await ggwave_factory();
                const params = ggwaveModule.getDefaultParameters();
                params.sampleRateInp = audioContext.sampleRate;
                params.sampleRateOut = audioContext.sampleRate;
                ggwaveInstance = ggwaveModule.init(params);
                if (ggwaveInstance == null || ggwaveInstance < 0) {
                    throw new Error('ggwave.init() failed, returned: ' + ggwaveInstance);
                }

                console.log('ggwave initialized OK, instance:', ggwaveInstance,
                    '| ProtocolId available:', !!ggwaveModule.ProtocolId,
                    '| devMode:', isDevMode,
                    '| protocolId:', getProtocolId());

                // Start emission loop — 5s gap to avoid overlapping waveforms
                updateAndEmit();
                emitInterval = setInterval(updateAndEmit, 5000);
                setInterval(updateTimerBar, 100);
            } catch (e) {
                console.error('ggwave init error:', e);
                document.getElementById('status-text').textContent =
                    'Erreur ggwave — code affiché uniquement (saisie manuelle)';
                document.getElementById('emit-dot').style.background = '#f87171';
                // Still show TOTP codes
                updateTOTPDisplay();
                setInterval(updateTOTPDisplay, 1000);
                setInterval(updateTimerBar, 100);
            }
        }

        function generateTOTP() {
            const totp = new OTPAuth.TOTP({
                secret: totpSecret,
                digits: 6,
                period: 30,
                algorithm: 'SHA1',
            });
            return totp.generate();
        }

        function updateTOTPDisplay() {
            const code = generateTOTP();
            document.getElementById('totp-code').textContent = code;
            return code;
        }

        // Reinterpret raw byte array as a different TypedArray (e.g. Int8Array -> Float32Array)
        function convertTypedArray(src, type) {
            var buffer = new ArrayBuffer(src.byteLength);
            new src.constructor(buffer).set(src);
            return new type(buffer);
        }

        function getProtocolId() {
            // Use named constants if available, raw integers as fallback
            const P = ggwaveModule.ProtocolId;
            if (isDevMode) {
                return P ? P.GGWAVE_PROTOCOL_AUDIBLE_NORMAL : 0;
            } else {
                return P ? P.GGWAVE_PROTOCOL_ULTRASOUND_NORMAL : 3;
            }
        }

        function updateAndEmit() {
            const code = updateTOTPDisplay();

            if (!ggwaveModule || ggwaveInstance == null || !audioContext) {
                console.warn('updateAndEmit: not ready — module:', !!ggwaveModule, 'instance:', ggwaveInstance, 'ctx:', !!audioContext);
                return;
            }

            // Resume AudioContext if browser suspended it
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            try {
                const protocolId = getProtocolId();
                const volume = 100;

                const waveform = ggwaveModule.encode(
                    ggwaveInstance,
                    code,
                    protocolId,
                    volume
                );

                if (waveform && waveform.length > 0) {
                    playWaveform(waveform);
                    console.log('Emitted TOTP:', code, '| protocol:', protocolId, '| bytes:', waveform.length, '| type:', waveform.constructor.name);
                } else {
                    console.warn('ggwave encode returned empty — protocolId:', protocolId, 'code:', code);
                }
            } catch (e) {
                console.error('Encode/play error:', e, e.stack);
            }
        }

        function playWaveform(waveform) {
            // ggwave.encode() returns raw bytes — reinterpret as Float32 samples
            var buf = convertTypedArray(waveform, Float32Array);

            var buffer = audioContext.createBuffer(1, buf.length, audioContext.sampleRate);
            buffer.getChannelData(0).set(buf);

            var source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start(0);
        }

        function updateTimerBar() {
            const now = Date.now() / 1000;
            const elapsed = now % 30;
            const pct = ((30 - elapsed) / 30) * 100;
            document.getElementById('timer-fill').style.width = pct + '%';

            // Refresh TOTP display every second
            const code = generateTOTP();
            if (document.getElementById('totp-code').textContent !== code) {
                document.getElementById('totp-code').textContent = code;
                lastCode = '';
            }
        }
    </script>
</body>
</html>
